<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}assistant{% endblock %}</title>
  {# Minimal styling for now — the full Tailwind shell lands with the real
     pages (#27/#28). Just enough to not look broken. #}
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #0f172a; color: #e2e8f0;
    }
    .card {
      background: #1e293b; padding: 2.5rem; border-radius: 1rem;
      width: min(92vw, 26rem); box-shadow: 0 10px 40px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 .5rem; font-size: 1.5rem; }
    p  { color: #94a3b8; line-height: 1.5; }
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      background: #fff; color: #1e293b; text-decoration: none;
      padding: .7rem 1.1rem; border-radius: .6rem; font-weight: 600;
      margin-top: 1rem;
    }
    .muted { font-size: .85rem; }
    a.link { color: #93c5fd; }
  </style>
</head>
<body>
  <main class="card">
    {% block content %}{% endblock %}
  </main>
</body>
</html>

<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat · assistant</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100dvh; display: flex; flex-direction: column;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a; color: #e2e8f0;
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: .8rem 1rem; border-bottom: 1px solid #1e293b; flex-shrink: 0;
    }
    header .who { font-size: .8rem; color: #94a3b8; }
    header a { color: #93c5fd; font-size: .8rem; text-decoration: none; }
    #log {
      flex: 1; overflow-y: auto; padding: 1rem;
      display: flex; flex-direction: column; gap: .6rem;
      max-width: 48rem; width: 100%; margin: 0 auto;
    }
    .msg { padding: .6rem .85rem; border-radius: .9rem; max-width: 85%; line-height: 1.4; white-space: pre-wrap; }
    .me  { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: .2rem; }
    .bot { align-self: flex-start; background: #1e293b; border-bottom-left-radius: .2rem; }
    .bot.pending { color: #94a3b8; font-style: italic; }
    form {
      display: flex; gap: .5rem; padding: .75rem 1rem;
      border-top: 1px solid #1e293b; flex-shrink: 0;
      max-width: 48rem; width: 100%; margin: 0 auto;
    }
    #input {
      flex: 1; resize: none; border: 1px solid #334155; border-radius: .7rem;
      background: #0b1220; color: #e2e8f0; padding: .6rem .8rem; font: inherit;
    }
    button {
      border: 0; border-radius: .7rem; background: #2563eb; color: #fff;
      padding: 0 1.1rem; font-weight: 600; cursor: pointer;
    }
    button:disabled { opacity: .5; cursor: default; }
  </style>
</head>
<body>
  <header>
    <strong>assistant</strong>
    <span class="who">{{ member["full_name"] }} · <a href="/logout">salir</a></span>
  </header>

  <div id="log">
    <div class="msg bot">Hola {{ member["full_name"].split(" ")[0] }}. Contame un gasto o ingreso y lo registro. Por ejemplo: "gasté 20 en el super".</div>
  </div>

  <form id="form">
    <textarea id="input" rows="1" placeholder="Escribí un mensaje..." autocomplete="off"></textarea>
    <button type="submit" id="send">Enviar</button>
  </form>

  <script>
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const send = document.getElementById("send");

    // Minimal markdown: **bold**. Text is inserted as textContent first (no
    // HTML injection), then bold spans are applied.
    function render(el, text) {
      const parts = text.split(/(\*\*[^*]+\*\*)/g);
      for (const p of parts) {
        if (p.startsWith("**") && p.endsWith("**")) {
          const b = document.createElement("strong");
          b.textContent = p.slice(2, -2);
          el.appendChild(b);
        } else {
          el.appendChild(document.createTextNode(p));
        }
      }
    }

    function add(text, cls) {
      const el = document.createElement("div");
      el.className = "msg " + cls;
      render(el, text);
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
      return el;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      add(text, "me");
      input.value = "";
      send.disabled = true;
      const pending = add("escribiendo...", "bot pending");
      try {
        const r = await fetch("/chat/message", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        const data = await r.json();
        pending.remove();
        add(data.reply || data.error || "(sin respuesta)", "bot");
      } catch (err) {
        pending.remove();
        add("Error de conexión. Probá de nuevo.", "bot");
      } finally {
        send.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>

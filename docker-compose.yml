services:
  postgres:
    image: postgres:16
    container_name: sovereignbox_db
    environment:
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: sovereign123
      POSTGRES_DB: sovereignbox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/migrations
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sovereignbox_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: sovereignbox_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  metabase:
    image: metabase/metabase
    container_name: sovereignbox_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: sovereignbox
      MB_DB_PORT: 5432
      MB_DB_USER: sovereign
      MB_DB_PASS: sovereign123
      MB_DB_HOST: postgres
    depends_on:
      - postgres
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: sovereignbox_api
    ports:
      - "8080:8080"
    volumes:
      - media_data:/app/data/files
    environment:
      DATABASE_URL: postgresql+asyncpg://sovereign:sovereign123@postgres:5432/sovereignbox
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://ollama:11434
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  media_data:

services:
  postgres:
    image: postgres:16
    container_name: sovereignbox_db
    environment:
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: sovereign123
      POSTGRES_DB: sovereignbox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/migrations
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    container_name: sovereignbox_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

  ollama:
    image: ollama/ollama
    container_name: sovereignbox_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3g
          cpus: "6.0"

  adminer:
    image: adminer:latest
    container_name: sovereignbox_adminer
    ports:
      - "8888:8080"
    depends_on:
      - postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.5"

  metabase:
    image: metabase/metabase
    container_name: sovereignbox_metabase
    profiles:
      - monitoring
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: sovereignbox
      MB_DB_PORT: 5432
      MB_DB_USER: sovereign
      MB_DB_PASS: sovereign123
      MB_DB_HOST: postgres
    depends_on:
      - postgres
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: sovereignbox_api
    ports:
      - "8080:8080"
    volumes:
      - media_data:/app/data/files
    environment:
      DATABASE_URL: postgresql+asyncpg://sovereign:sovereign123@postgres:5432/sovereignbox
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  worker:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: sovereignbox_worker
    # Misma imagen que el API, distinto comando
    # --beat embebido evita un servicio extra (RAM-friendly).
    # --schedule en /tmp para que el archivo persista durante la vida del contenedor.
    command: celery -A app.workers.celery_app worker --beat --loglevel=info --concurrency=1 --schedule=/tmp/celerybeat-schedule
    volumes:
      - media_data:/app/data/files
    environment:
      DATABASE_URL: postgresql+asyncpg://sovereign:sovereign123@postgres:5432/sovereignbox
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
    depends_on:
      - postgres
      - redis
      - ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "3.0"

  backup:
    image: postgres:16-alpine
    container_name: sovereignbox_backup
    depends_on:
      - postgres
    environment:
      PGUSER: sovereign
      PGPASSWORD: sovereign123
      PGHOST: postgres
      PGDATABASE: sovereignbox
      RETENTION_DAYS: "30"
    volumes:
      - db_backups:/backups
      - ./scripts:/scripts:ro
      - media_data:/media_data:ro
    entrypoint: ["/bin/sh", "/scripts/backup-loop.sh"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.3"

volumes:
  postgres_data:
  ollama_data:
  media_data:
  db_backups:

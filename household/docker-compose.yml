services:
  postgres:
    image: postgres:16
    container_name: household_db
    environment:
      POSTGRES_USER: household
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-household123}
      POSTGRES_DB: household
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Postgres auto-runs any *.sql / *.sh in this dir on first volume init.
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U household -d household"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: household_api
    ports:
      - "8081:8080"
    volumes:
      # Live-mount the chat UI so HTML/CSS/JS edits don't require a rebuild.
      - ./chat:/code/chat:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://household:${POSTGRES_PASSWORD:-household123}@postgres:5432/household
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - tunnel
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: household_web
    ports:
      - "8082:8080"
    volumes:
      # Live-mount templates/static/code so edits don't require a rebuild.
      - ./web/app:/code/app:ro
    environment:
      # Plain postgresql:// DSN — asyncpg, not the server's +asyncpg form.
      DATABASE_URL: postgresql://household:${POSTGRES_PASSWORD:-household123}@postgres:5432/household
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      # Attached so its own Cloudflare hostname can reach it (household_web:8080).
      - tunnel
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: household_adminer
    ports:
      - "8889:8080"
    depends_on:
      - postgres
    restart: unless-stopped

networks:
  # household's own bridge network (default)
  default:
  # Pre-existing network the Cloudflare tunnel container lives on; we attach
  # household_api here so the tunnel can reach it via Docker DNS (household_api:8080).
  tunnel:
    name: ollama-vision-bench_default
    external: true

volumes:
  postgres_data:
    name: household_postgres_data
